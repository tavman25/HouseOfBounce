services:
  - type: web
    name: house-of-bounce
    runtime: go
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app
    startCommand: ./app
    plan: free
    envVars:
      - key: PORT
        generateValue: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_TO
        sync: false
